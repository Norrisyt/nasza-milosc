<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koperty Specjalne ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');
       
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: #333;
            text-align: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4.3rem;
            color: #fff;
            text-shadow: 0 0 25px rgba(255,105,180,0.9);
        }
        .subtitle {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 50px;
        }
        .envelopes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 35px;
            margin-top: 30px;
        }
        .envelope {
            width: 320px;
            height: 230px;
            background: linear-gradient(145deg, #ff69b4, #ff1493);
            border-radius: 15px 15px 85px 15px;
            position: relative;
            box-shadow: 0 15px 45px rgba(0,0,0,0.25);
            cursor: pointer;
            transition: 0.4s;
            overflow: hidden;
        }
        .envelope:hover {
            transform: scale(1.08) rotate(4deg);
        }
        .envelope::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            width: 0; height: 0;
            border-left: 75px solid transparent;
            border-right: 75px solid transparent;
            border-bottom: 95px solid #fff;
            transform: translateX(-50%);
        }
        .envelope.locked {
            filter: brightness(0.75) grayscale(80%);
            cursor: not-allowed;
        }
        .envelope-content {
            position: absolute;
            bottom: 25px;
            left: 0; right: 0;
            color: white;
            font-size: 1.35rem;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .status {
            margin-top: 12px;
            font-size: 1.15rem;
            color: #fff;
        }
        .nav {
            margin: 40px 0 45px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .nav button {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav button:hover {
            background: #ff1493;
            transform: scale(1.08);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nasze Koperty ❤️</h1>
        <p class="subtitle">Specjalne listy tylko dla Ciebie...</p>
        
        <div class="nav">
            <button onclick="location.href='index.html'">❤️ Strona główna</button>
            <button onclick="location.href='powody.html'">1000 Powodów</button>
            <button onclick="location.href='kalendarz.html'">Kalendarz Miłości</button>
            <button onclick="location.href='galeria.html'">Galeria wspomnień</button>
            <button onclick="location.href='odliczanie.html'">Odliczanie dni</button>
            <button onclick="location.href='os-czasu.html'">Nasza oś czasu</button>
        </div>

        <div class="envelopes">
            <!-- 1 Miesiąc -->
            <div class="envelope" id="envelope1m">
                <div class="envelope-content">1 Miesiąc Razem</div>
                <div class="status" id="status1m">1 listopada 2025</div>
            </div>

            <!-- 100 Dni -->
            <div class="envelope" id="envelope100">
                <div class="envelope-content">100 Dni Razem</div>
                <div class="status" id="status100">9 stycznia 2026</div>
            </div>

            <!-- 200 Dni -->
            <div class="envelope" id="envelope200">
                <div class="envelope-content">200 Dni Razem</div>
                <div class="status" id="status200">19 kwietnia 2026</div>
            </div>

            <!-- 300 Dni -->
            <div class="envelope" id="envelope300">
                <div class="envelope-content">300 Dni Razem</div>
                <div class="status" id="status300">28 lipca 2026</div>
            </div>

            <!-- Walentynki -->
            <div class="envelope" id="envelopeVal">
                <div class="envelope-content">Pierwsze Walentynki</div>
                <div class="status" id="statusVal">14 lutego 2026</div>
            </div>

            <!-- 1 Rok -->
            <div class="envelope" id="envelope1y">
                <div class="envelope-content">1 Rok Razem</div>
                <div class="status" id="status1y">1 października 2026</div>
            </div>

            <!-- Zakończenie roku szkolnego -->
            <div class="envelope" id="envelopeSchool">
                <div class="envelope-content">Zakończenie roku szkolnego</div>
                <div class="status" id="statusSchool">24 czerwca 2026</div>
            </div>
        </div>
    </div>

    <script>
        const unlockDates = {
            envelope1m:    new Date("2025-11-01T00:00:00"),
            envelope100:   new Date("2026-01-09T00:00:00"),
            envelope200:   new Date("2026-04-19T00:00:00"),
            envelope300:   new Date("2026-07-28T00:00:00"),
            envelopeVal:   new Date("2026-02-14T00:00:00"),
            envelope1y:    new Date("2026-10-01T00:00:00"),
            envelopeSchool:new Date("2026-06-24T00:00:00")
        };

        function checkEnvelopes() {
            const now = new Date();

            function unlockEnvelope(id, message) {
                const env = document.getElementById(id);
                const statusId = "status" + id.replace("envelope", "");
                const status = document.getElementById(statusId);
                
                if (now >= unlockDates[id]) {
                    env.classList.remove("locked");
                    status.innerHTML = `<strong>Kliknij, żeby otworzyć ❤️</strong>`;
                    env.onclick = () => alert(message);
                } else {
                    env.classList.add("locked");
                }
            }

            unlockEnvelope("envelope1m", 
`❤️ Moja najpiękniejsza,

Minął już pierwszy miesiąc odkąd jesteśmy razem.
To był najpiękniejszy miesiąc w moim życiu.

Dziękuję Ci za każdy uśmiech, każdy pocałunek i każdą chwilę z Tobą.

Kocham Cię ❤️`);

            unlockEnvelope("envelope100", 
`❤️ Kochanie,

Dokładnie 100 dni jesteśmy razem.
100 dni Twojego śmiechu, Twoich spojrzeń i Twojej bliskości.

Nie mogę się doczekać kolejnych setek dni u Twojego boku.

Na zawsze Twój`);

            unlockEnvelope("envelope200", 
`❤️ Moja najpiękniejsza,

200 dni razem... 
Dwieście razy zasypiałem z myślą o Tobie.

Dziękuję, że jesteś w moim życiu. Kocham Cię coraz mocniej.`);

            unlockEnvelope("envelope300", 
`❤️ Najpiękniejsza,

300 dni minęło od naszego pierwszego dnia.
A ja nadal patrzę na Ciebie z motylami w brzuchu.

Jesteś moim największym szczęściem.

Kocham Cię ponad wszystko ❤️`);

            unlockEnvelope("envelopeVal", 
`❤️ Moja Walentynka,

To nasze pierwsze wspólne Walentynki.
Chciałem, żeby ten dzień był wyjątkowy — tak jak wyjątkowa jesteś Ty.

Kocham Cię całym sercem.`);

            unlockEnvelope("envelope1y", 
`❤️ Moja najpiękniejsza,

Minął dokładnie rok odkąd jesteśmy razem.
Rok pełen miłości, szczęścia i pięknych chwil.

Dziękuję Ci za ten rok. 
Nie wyobrażam sobie przyszłości bez Ciebie.

Kocham Cię na zawsze ❤️`);

            unlockEnvelope("envelopeSchool", 
`❤️ Kochana,

Gratuluję Ci zakończenia roku szkolnego!
Jestem z Ciebie naprawdę dumny. Wiem, że to był trudny rok, a Ty dałaś radę.

Bardzo Cię kocham i jestem przy Tobie zawsze.
Teraz czas odpocząć ❤️`);
        }

        window.onload = checkEnvelopes;
        setInterval(checkEnvelopes, 60000);
    </script>
</body>
</html>
