<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasza Oś Czasu ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');
       
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: #333;
            text-align: center;
            min-height: 100vh;
        }
        .container { 
            max-width: 950px; 
            margin: 40px auto; 
            padding: 20px; 
        }
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            color: #fff;
            text-shadow: 0 0 30px rgba(255,105,180,0.9);
            margin-bottom: 15px;
        }
        .subtitle { 
            font-size: 1.55rem; 
            color: #fff; 
            margin-bottom: 50px; 
        }
        .timeline { 
            position: relative; 
            max-width: 850px; 
            margin: 0 auto; 
        }
        .timeline::before {
            content: '';
            position: absolute;
            width: 6px;
            background: rgba(255,255,255,0.85);
            top: 0; bottom: 0;
            left: 50%;
            margin-left: -3px;
            border-radius: 10px;
        }
        .event {
            padding: 20px 40px;
            position: relative;
            width: 45%;
            margin-bottom: 85px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.7s ease;
        }
        .event.visible { 
            opacity: 1; 
            transform: translateY(0); 
        }
        .event:nth-child(odd) { 
            left: 0; 
            text-align: right; 
        }
        .event:nth-child(even) { 
            left: 55%; 
            text-align: left; 
        }
        .event::after {
            content: '❤️';
            position: absolute;
            width: 34px; 
            height: 34px;
            background: #ff1493;
            color: white;
            border-radius: 50%;
            top: 32px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255,20,147,0.4);
        }
        .event:nth-child(odd)::after { right: -17px; }
        .event:nth-child(even)::after { left: -17px; }

        .content {
            background: white;
            padding: 28px 32px;
            border-radius: 22px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.13);
            text-align: left;
        }
        .date {
            color: #ff1493;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        .title {
            font-size: 1.45rem;
            margin-bottom: 10px;
            color: #333;
        }
        .description {
            color: #555;
            line-height: 1.7;
        }

        .nav {
            margin: 45px 0 50px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
        }
        .nav button {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 15px 32px;
            font-size: 1.15rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav button:hover {
            background: #ff1493;
            transform: scale(1.08);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nasza Oś Czasu <span style="font-size:3.8rem;">❤️</span></h1>
        <p class="subtitle">Od pierwszego dnia aż do dziś...</p>

        <!-- Ujednolicona nawigacja -->
        <div class="nav">
            <button onclick="location.href='index.html'">❤️ Strona główna</button>
            <button onclick="location.href='kalendarz.html'">Kalendarz Miłości</button>
            <button onclick="location.href='powody.html'">1000 Powodów</button>
            <button onclick="location.href='koperty.html'">Koperty specjalne</button>
            <button onclick="location.href='galeria.html'">Galeria wspomnień</button>
            <button onclick="location.href='odliczanie.html'">Odliczanie dni</button>
            <button onclick="location.href='os-czasu.html'">Nasza oś czasu</button>
        </div>

        <div class="timeline" id="timeline">
            <div class="event">
                <div class="content">
                    <div class="date">1 października 2025</div>
                    <div class="title">Pierwszy dzień razem</div>
                    <div class="description">Zaczęło się nasza historia. Od tego dnia wszystko się zmieniło na lepsze.</div>
                </div>
            </div>

            <!-- Możesz tutaj dodawać kolejne wydarzenia -->
            <!-- Przykład:
            <div class="event">
                <div class="content">
                    <div class="date">14 lutego 2026</div>
                    <div class="title">Pierwsze Walentynki</div>
                    <div class="description">Nasze pierwsze wspólne święto zakochanych.</div>
                </div>
            </div>
            -->
        </div>
    </div>

    <script>
        function animateTimeline() {
            const events = document.querySelectorAll('.event');
            const triggerBottom = window.innerHeight * 0.82;
            
            events.forEach(event => {
                if (event.getBoundingClientRect().top < triggerBottom) {
                    event.classList.add('visible');
                }
            });
        }

        window.addEventListener('scroll', animateTimeline);
        window.addEventListener('load', animateTimeline);
    </script>
</body>
</html>
