<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Naszych Wspomnień ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');
        
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: #333;
            text-align: center;
        }
        .container { max-width: 1100px; margin: 40px auto; padding: 20px; }
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: white;
            text-shadow: 0 0 25px rgba(255,105,180,0.9);
        }
        .subtitle { font-size: 1.5rem; color: #fff; margin-bottom: 40px; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px;
        }
        .memory {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s;
        }
        .memory:hover { transform: translateY(-10px); }
        .memory img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }
        .info { padding: 20px; text-align: left; }
        .date { color: #ff1493; font-weight: 600; }
        .nav {
            margin: 35px 0 45px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .nav button {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav button:hover { background: #ff1493; transform: scale(1.08); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nasze Wspomnienia <span class="heart">❤️</span></h1>
        <p class="subtitle">Każde zdjęcie to kawałek naszej historii...</p>

        <div class="nav">
            <button onclick="location.href='index.html'">❤️ Strona główna</button>
            <button onclick="location.href='kalendarz.html'">Kalendarz Miłości</button>
            <button onclick="location.href='powody.html'">1000 Powodów</button>
            <button onclick="location.href='koperty.html'">Koperty specjalne</button>
            <button onclick="location.href='galeria.html'">Galeria wspomnień</button>
            <button onclick="location.href='odliczanie.html'">Odliczanie dni</button>
            <button onclick="location.href='os-czasu.html'">Nasza oś czasu</button>
        </div>

        <div class="gallery">
            <!-- Dodawaj tutaj swoje zdjęcia -->
            <div class="memory">
                <img src="https://via.placeholder.com/600x400/ffb6c1/ffffff?text=Zdjęcie+1" alt="Wspomnienie 1">
                <div class="info">
                    <div class="date">1 października 2025</div>
                    <div class="description">Nasz pierwszy dzień razem.</div>
                </div>
            </div>
            <!-- Dodaj więcej wspomnień -->
        </div>
    </div>
</body>
</html>
