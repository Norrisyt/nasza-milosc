<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dla mojej najpiękniejszej ❤️</title>
    <script>
        if (!localStorage.getItem("adminMode")) {
            window.location.href = "maintenance.html";
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
       
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: #333;
            text-align: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { 
            max-width: 950px; 
            margin: 40px auto; 
            padding: 20px; 
        }
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4.6rem;
            color: #fff;
            text-shadow: 0 0 30px rgba(255,105,180,0.9);
            margin: 0 0 15px 0;
        }
        .heart-big {
            font-size: 7.2rem;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .heart-big:hover { 
            transform: scale(1.25) rotate(12deg); 
        }
        .subtitle {
            font-size: 1.55rem;
            color: #fff;
            margin-bottom: 45px;
        }
        .nav {
            margin: 50px 0 45px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
        }
        .nav button {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 15px 32px;
            font-size: 1.15rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav button:hover {
            background: #ff1493;
            transform: scale(1.08);
        }
        button {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 1.35rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { 
            background: #ff1493; 
            transform: scale(1.08); 
        }
        .reason {
            background: white;
            padding: 25px 30px;
            margin: 20px auto;
            max-width: 700px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            text-align: left;
            display: none;
            font-size: 1.22rem;
            line-height: 1.65;
        }
        .reason.show { display: block; animation: fadeIn 0.6s; }
        @keyframes fadeIn { from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);} }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dla mojej najpiękniejszej <span class="heart-big" id="bigHeart">❤️</span></h1>
        <p class="subtitle">Razem od 1 października 2025 ❤️<br>Kliknij w duże serce, żeby dostać losowy powód</p>

        <div class="nav">
            <button onclick="location.href='index.html'">❤️ Strona główna</button>
            <button onclick="location.href='kalendarz.html'">Kalendarz Miłości</button>
            <button onclick="location.href='powody.html'">1000 Powodów</button>
            <button onclick="location.href='koperty.html'">Koperty specjalne</button>
            <button onclick="location.href='galeria.html'">Galeria wspomnień</button>
            <button onclick="location.href='odliczanie.html'">Odliczanie dni</button>
            <button onclick="location.href='os-czasu.html'">Nasza oś czasu</button>
        </div>

        <div id="currentReason" class="reason"></div>
        <div id="reasonsList"></div>

        <button onclick="toggleMusic()">♪ Muzyka: <span id="musicStatus">Włączona</span></button>
    </div>

    <audio id="bgMusic" autoplay loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3" type="audio/mpeg">
    </audio>

    <script>
        const reasons = [
            "Twój uśmiech rozświetla mój cały dzień",
            "Kiedy się śmiejesz, zapominam o całym świecie",
            "Jesteś najcieplejszą osobą jaką znam",
            "Kocham sposób, w jaki na mnie patrzysz",
            "Przy Tobie czuję się jak w domu",
            "Twoje oczy są moim ulubionym widokiem",
            "Jesteś moim spokojem w chaotycznym świecie",
            "Kocham jak pachną Twoje włosy",
            "Z Tobą nawet zwykły dzień staje się wyjątkowy",
            "Jesteś moim największym szczęściem"
        ];

        let savedReasons = JSON.parse(localStorage.getItem("savedReasons")) || [];

        function showRandomReason() {
            const random = reasons[Math.floor(Math.random() * reasons.length)];
            const reasonDiv = document.getElementById("currentReason");
            reasonDiv.innerHTML = `<strong>Powód #${savedReasons.length + 1}:</strong><br>${random}`;
            reasonDiv.classList.add("show");

            savedReasons.unshift(random);
            localStorage.setItem("savedReasons", JSON.stringify(savedReasons));
            renderSavedReasons();
        }

        function renderSavedReasons() {
            const list = document.getElementById("reasonsList");
            list.innerHTML = savedReasons.length ? 
                "<h2 style='color:#fff; margin:50px 0 25px;'>Ostatnio zapisane powody:</h2>" : "";

            savedReasons.slice(0, 6).forEach((reason, i) => {
                const div = document.createElement("div");
                div.className = "reason";
                div.style.display = "block";
                div.innerHTML = `<strong>Powód #${savedReasons.length - i}:</strong><br>${reason}`;
                list.appendChild(div);
            });
        }

        function toggleMusic() {
            const music = document.getElementById("bgMusic");
            const status = document.getElementById("musicStatus");
            if (music.paused) {
                music.play();
                status.textContent = "Włączona";
            } else {
                music.pause();
                status.textContent = "Wyłączona";
            }
        }

        document.getElementById("bigHeart").addEventListener("click", showRandomReason);

        window.onload = () => {
            renderSavedReasons();
            document.getElementById("bgMusic").volume = 0.35;
        };
    </script>
</body>
</html>
