<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasz Kalendarz Miłości ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');
        
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: #333;
            text-align: center;
            min-height: 100vh;
        }
        .container { max-width: 1100px; margin: 40px auto; padding: 20px; }
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4.4rem;
            color: #fff;
            text-shadow: 0 0 25px rgba(255,105,180,0.9);
        }
        .subtitle { font-size: 1.5rem; color: #fff; margin-bottom: 40px; }

        .calendar {
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 1.6rem;
            color: #ff1493;
        }

        .nav-btn {
            background: #ff69b4;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
        }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; color: #ff1493; font-weight: 600; }
        td {
            padding: 15px 8px;
            height: 75px;
            vertical-align: top;
            border: 1px solid #ffe0e9;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }
        td:hover { background: #fff0f5; }
        .today { background: #ff1493; color: white; border-radius: 50%; }
        .heart-day {
            position: absolute;
            bottom: 6px;
            right: 8px;
            font-size: 1.4rem;
            animation: beat 1.3s infinite;
        }
        @keyframes beat { 0%,100% {transform:scale(1);} 50% {transform:scale(1.45);} }

        .nav {
            margin: 40px 0 30px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .nav button {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav button:hover { background: #ff1493; transform: scale(1.08); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nasz Kalendarz Miłości <span class="heart">❤️</span></h1>
        <p class="subtitle">Kliknij w dowolny dzień, żeby dodać notatkę</p>

        <div class="nav">
            <button onclick="location.href='index.html'">❤️ Strona główna</button>
            <button onclick="location.href='powody.html'">1000 Powodów</button>
            <button onclick="location.href='koperty.html'">Koperty specjalne</button>
            <button onclick="location.href='galeria.html'">Galeria wspomnień</button>
            <button onclick="location.href='odliczanie.html'">Odliczanie dni</button>
            <button onclick="location.href='os-czasu.html'">Nasza oś czasu</button>
        </div>

        <div class="calendar">
            <div class="header">
                <button class="nav-btn" onclick="prevMonth()">‹</button>
                <span id="monthYear"></span>
                <button class="nav-btn" onclick="nextMonth()">›</button>
            </div>
            <table id="calendarTable">
                <thead>
                    <tr><th>Nd</th><th>Pn</th><th>Wt</th><th>Śr</th><th>Cz</th><th>Pt</th><th>So</th></tr>
                </thead>
                <tbody id="calendarBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let notes = JSON.parse(localStorage.getItem("loveCalendarNotes")) || {};

        function renderCalendar() {
            const monthYear = document.getElementById("monthYear");
            const body = document.getElementById("calendarBody");
            body.innerHTML = "";

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            monthYear.textContent = currentDate.toLocaleString('pl-PL', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            let date = 1;

            for (let i = 0; i < 6; i++) {
                let row = document.createElement("tr");
                for (let j = 0; j < 7; j++) {
                    let cell = document.createElement("td");

                    if (i === 0 && j < firstDay) {
                        cell.textContent = "";
                        cell.style.color = "#ddd";
                    } else if (date > daysInMonth) {
                        cell.textContent = "";
                    } else {
                        const fullDate = `${year}-${String(month+1).padStart(2,'0')}-${String(date).padStart(2,'0')}`;

                        cell.textContent = date;

                        if (notes[fullDate]) {
                            const heart = document.createElement("span");
                            heart.className = "heart-day";
                            heart.textContent = "❤️";
                            cell.appendChild(heart);
                        }

                        cell.onclick = () => openNoteModal(fullDate, date);
                        date++;
                    }
                    row.appendChild(cell);
                }
                body.appendChild(row);
                if (date > daysInMonth) break;
            }
        }

        function openNoteModal(dateStr, day) {
            const currentNote = notes[dateStr] || "";
            const newNote = prompt(`Notatka na dzień ${day} ${currentDate.toLocaleString('pl-PL', { month: 'long' })} ${currentDate.getFullYear()}\n\nWpisz tekst:`, currentNote);
            
            if (newNote !== null) {
                if (newNote.trim() === "") {
                    delete notes[dateStr];
                } else {
                    notes[dateStr] = newNote.trim();
                }
                localStorage.setItem("loveCalendarNotes", JSON.stringify(notes));
                renderCalendar();
            }
        }

        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        window.onload = renderCalendar;
    </script>
</body>
</html>
