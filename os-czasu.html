<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasza Oś Czasu ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');
        
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: #333;
            text-align: center;
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 40px auto; padding: 20px; }
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4.2rem;
            color: white;
            text-shadow: 0 0 25px rgba(255,105,180,0.9);
        }
        .subtitle { font-size: 1.5rem; color: #fff; margin-bottom: 50px; }
        .timeline { position: relative; max-width: 800px; margin: 0 auto; }
        .timeline::before {
            content: '';
            position: absolute;
            width: 6px;
            background: white;
            top: 0; bottom: 0;
            left: 50%;
            margin-left: -3px;
        }
        .event {
            padding: 20px 40px;
            position: relative;
            width: 45%;
            margin-bottom: 80px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }
        .event.visible { opacity: 1; transform: translateY(0); }
        .event:nth-child(odd) { left: 0; text-align: right; }
        .event:nth-child(even) { left: 55%; text-align: left; }
        .event::after {
            content: '❤️';
            position: absolute;
            width: 30px; height: 30px;
            background: #ff1493;
            color: white;
            border-radius: 50%;
            top: 28px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .event:nth-child(odd)::after { right: -15px; }
        .event:nth-child(even)::after { left: -15px; }
        .content {
            background: white;
            padding: 25px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.15);
        }
        .nav {
            margin: 35px 0 45px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .nav button {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav button:hover { background: #ff1493; transform: scale(1.08); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nasza Historia <span style="font-size:3.5rem;">❤️</span></h1>
        <p class="subtitle">Od pierwszego dnia aż do dziś...</p>

        <div class="nav">
            <button onclick="location.href='index.html'">❤️ Strona główna</button>
            <button onclick="location.href='kalendarz.html'">Kalendarz Miłości</button>
            <button onclick="location.href='powody.html'">1000 Powodów</button>
            <button onclick="location.href='koperty.html'">Koperty specjalne</button>
            <button onclick="location.href='galeria.html'">Galeria wspomnień</button>
            <button onclick="location.href='odliczanie.html'">Odliczanie dni</button>
        </div>

        <div class="timeline" id="timeline">
            <div class="event">
                <div class="content">
                    <div class="date">1 października 2025</div>
                    <div class="title">Pierwszy dzień razem</div>
                    <div class="description">Zaczęło się wszystko. Od tego dnia nie wyobrażam sobie życia bez Ciebie.</div>
                </div>
            </div>
            <!-- Dodawaj kolejne wydarzenia -->
        </div>
    </div>

    <script>
        function animateTimeline() {
            const events = document.querySelectorAll('.event');
            const triggerBottom = window.innerHeight * 0.85;
            events.forEach(event => {
                if (event.getBoundingClientRect().top < triggerBottom) {
                    event.classList.add('visible');
                }
            });
        }
        window.addEventListener('scroll', animateTimeline);
        window.addEventListener('load', animateTimeline);
    </script>
</body>
</html>
