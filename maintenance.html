<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przerwa techniczna ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');
        
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 540px;
            padding: 50px 35px;
            background: white;
            border-radius: 35px;
            box-shadow: 0 25px 70px rgba(255,105,180,0.35);
        }
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4.3rem;
            color: #ff1493;
            margin: 0 0 15px 0;
        }
        .heart { font-size: 4.8rem; animation: beat 1.4s infinite; }
        @keyframes beat { 0%,100% {transform:scale(1);} 50% {transform:scale(1.35);} }
        p { font-size: 1.35rem; line-height: 1.8; color: #555; margin: 20px 0 30px; }
        input {
            padding: 18px 30px;
            font-size: 1.45rem;
            border: 4px solid #ff69b4;
            border-radius: 50px;
            width: 320px;
            text-align: center;
            outline: none;
        }
        button {
            background: #ff69b4; color: white; border: none;
            padding: 16px 60px; font-size: 1.4rem; border-radius: 50px;
            cursor: pointer; margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { background: #ff1493; transform: scale(1.1); }
        .error { color: #ff1493; margin-top: 15px; font-weight: 600; }
        .floating-hearts { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:-1; }
    </style>
</head>
<body>
    <div class="floating-hearts"></div>
    <div class="container">
        <h1>Przerwa techniczna <span class="heart">❤️</span></h1>
        <p>Tylko dla mojej najpiękniejszej dziewczyny<br><strong>Werki</strong> 💕</p>
        
        <input type="password" id="password" placeholder="Hasło dostępu..." autocomplete="off">
        <br>
        <button onclick="checkPassword()">Wejdź do naszego świata 💖</button>
        <div id="error" class="error"></div>
    </div>

    <script>
        const correctPassword = "Shire123%";

        function checkPassword() {
            if (document.getElementById('password').value === correctPassword) {
                localStorage.setItem("adminMode", "true");
                window.location.href = "index.html";
            } else {
                document.getElementById('error').textContent = "Złe hasło, kochanie... spróbuj jeszcze raz 💔";
                document.getElementById('password').value = "";
            }
        }

        // Animacja serc
        function createHeart() {
            const heart = document.createElement('div');
            heart.textContent = '❤️';
            heart.style.position = 'absolute';
            heart.style.fontSize = Math.random()*40 + 25 + 'px';
            heart.style.left = Math.random()*100 + 'vw';
            heart.style.top = '-80px';
            heart.style.opacity = Math.random()*0.7 + 0.4;
            heart.style.animation = `fall ${Math.random()*12 + 10}s linear forwards`;
            document.querySelector('.floating-hearts').appendChild(heart);
            setTimeout(() => heart.remove(), 25000);
        }
        setInterval(createHeart, 280);

        const style = document.createElement('style');
        style.innerHTML = `@keyframes fall { to { transform: translateY(140vh) rotate(45deg); opacity: 0; } }`;
        document.head.appendChild(style);

        document.getElementById('password').addEventListener('keypress', e => { if(e.key==="Enter") checkPassword(); });
    </script>
</body>
</html>
