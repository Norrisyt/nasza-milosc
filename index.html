<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dla mojej najpiękniejszej ❤️</title>

    <script>
        if (!localStorage.getItem("adminMode")) {
            window.location.href = "maintenance.html";
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        
        body { 
            margin:0; padding:0; 
            font-family:'Poppins',sans-serif; 
            background:linear-gradient(135deg,#ff9a9e 0%,#fad0c4 99%); 
            color:#333; 
            text-align:center; 
            overflow-x:hidden; 
        }
        .container { max-width:900px; margin:40px auto; padding:20px; }
        h1 { 
            font-family:'Dancing Script',cursive; 
            font-size:4.2rem; 
            color:#fff; 
            text-shadow:0 0 25px rgba(255,105,180,0.9); 
        }
        .heart-big { 
            font-size:6.5rem; 
            cursor:pointer; 
            transition:0.4s; 
        }
        .heart-big:hover { transform:scale(1.2) rotate(10deg); }
        .reason { 
            background:white; 
            padding:22px; 
            margin:18px auto; 
            max-width:680px; 
            border-radius:22px; 
            box-shadow:0 12px 35px rgba(0,0,0,0.12); 
            text-align:left; 
            display:none; 
        }
        .nav {
            margin: 35px 0 45px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .nav button {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav button:hover {
            background: #ff1493;
            transform: scale(1.08);
        }
        button {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 1.35rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: #ff1493; transform: scale(1.08); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dla mojej najpiękniejszej <span class="heart-big" id="bigHeart">❤️</span></h1>
        <p style="font-size:1.45rem; color:#fff;">Kliknij w duże serce, żeby dostać losowy powód</p>

        <!-- Nawigacja -->
        <div class="nav">
            <button onclick="location.href='index.html'">❤️ Strona główna</button>
            <button onclick="location.href='powody.html'">1000 Powodów</button>
            <button onclick="location.href='koperty.html'">Koperty specjalne</button>
            <button onclick="location.href='galeria.html'">Galeria wspomnień</button>
            <button onclick="location.href='odliczanie.html'">Odliczanie dni</button>
            <button onclick="location.href='os-czasu.html'">Nasza oś czasu</button>
        </div>

        <div id="currentReason" class="reason"></div>
        <div id="reasonsList"></div>

        <button onclick="toggleMusic()">♪ Muzyka: <span id="musicStatus">Włączona</span></button>
    </div>

    <audio id="bgMusic" autoplay loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3" type="audio/mpeg">
    </audio>

    <script>
        const reasons = [
            "Twój uśmiech rozświetla mój cały dzień",
            "Kiedy się śmiejesz, zapominam o całym świecie",
            "Jesteś najcieplejszą osobą jaką znam",
            "Kocham sposób, w jaki na mnie patrzysz",
            "Przy Tobie czuję się jak w domu",
            "Twoje oczy są moim ulubionym widokiem",
            "Jesteś moim spokojem w chaotycznym świecie",
            "Kocham jak pachną Twoje włosy",
            "Z Tobą nawet zwykły dzień staje się wyjątkowy"
        ];

        let savedReasons = JSON.parse(localStorage.getItem("savedReasons")) || [];

        function showRandomReason() {
            const random = reasons[Math.floor(Math.random() * reasons.length)];
            document.getElementById("currentReason").innerHTML = `<strong>Powód #${savedReasons.length + 1}:</strong><br>${random}`;
            document.getElementById("currentReason").style.display = "block";

            savedReasons.unshift(random);
            localStorage.setItem("savedReasons", JSON.stringify(savedReasons));
            renderSavedReasons();
        }

        function renderSavedReasons() {
            const list = document.getElementById("reasonsList");
            list.innerHTML = savedReasons.length ? "<h2 style='color:#fff; margin:50px 0 20px;'>Ostatnio zapisane powody:</h2>" : "";
            savedReasons.slice(0, 6).forEach((reason, i) => {
                const div = document.createElement("div");
                div.className = "reason";
                div.style.display = "block";
                div.innerHTML = `<strong>Powód #${savedReasons.length - i}:</strong><br>${reason}`;
                list.appendChild(div);
            });
        }

        function toggleMusic() {
            const music = document.getElementById("bgMusic");
            const status = document.getElementById("musicStatus");
            if (music.paused) {
                music.play();
                status.textContent = "Włączona";
            } else {
                music.pause();
                status.textContent = "Wyłączona";
            }
        }

        document.getElementById("bigHeart").addEventListener("click", showRandomReason);
        window.onload = () => {
            renderSavedReasons();
            document.getElementById("bgMusic").volume = 0.35;
        };
    </script>
</body>
</html>
