<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koperty Specjalne ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');
        
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: #333;
            text-align: center;
            min-height: 100vh;
        }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4.3rem;
            color: #fff;
            text-shadow: 0 0 25px rgba(255,105,180,0.9);
        }
        .subtitle { font-size: 1.5rem; color: #fff; margin-bottom: 50px; }
        .envelopes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }
        .envelope {
            width: 320px;
            height: 220px;
            background: linear-gradient(145deg, #ff69b4, #ff1493);
            border-radius: 15px 15px 80px 15px;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            cursor: pointer;
            transition: 0.4s;
            overflow: hidden;
        }
        .envelope:hover { transform: scale(1.08) rotate(3deg); }
        .envelope::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            width: 0; height: 0;
            border-left: 70px solid transparent;
            border-right: 70px solid transparent;
            border-bottom: 90px solid #fff;
            transform: translateX(-50%);
        }
        .envelope.locked { filter: brightness(0.75) grayscale(80%); cursor: not-allowed; }
        .envelope-content {
            position: absolute;
            bottom: 25px;
            left: 0; right: 0;
            color: white;
            font-size: 1.4rem;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .status { margin-top: 12px; font-size: 1.15rem; color: #fff; }
        .nav {
            margin: 35px 0 45px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .nav button {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav button:hover { background: #ff1493; transform: scale(1.08); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nasze Koperty ❤️</h1>
        <p class="subtitle">Specjalne listy tylko dla Ciebie...</p>

        <div class="nav">
            <button onclick="location.href='index.html'">❤️ Strona główna</button>
            <button onclick="location.href='powody.html'">1000 Powodów</button>
            <button onclick="location.href='koperty.html'">Koperty specjalne</button>
            <button onclick="location.href='galeria.html'">Galeria wspomnień</button>
            <button onclick="location.href='odliczanie.html'">Odliczanie dni</button>
            <button onclick="location.href='os-czasu.html'">Nasza oś czasu</button>
        </div>

        <div class="envelopes">
            <div class="envelope" id="envelope1">
                <div class="envelope-content">Zakończenie roku szkolnego</div>
                <div class="status" id="status1">24 kwietnia 2026</div>
            </div>

            <div class="envelope" id="envelope2">
                <div class="envelope-content">Nasza 1. Rocznica</div>
                <div class="status" id="status2">1 października 2026</div>
            </div>
        </div>
    </div>

    <script>
        const unlockDates = {
            envelope1: new Date("2026-04-24T00:00:00"),
            envelope2: new Date("2026-10-01T00:00:00")
        };

        function checkEnvelopes() {
            const now = new Date();

            // Koperta 1
            const env1 = document.getElementById("envelope1");
            const status1 = document.getElementById("status1");
            if (now >= unlockDates.envelope1) {
                env1.classList.remove("locked");
                status1.innerHTML = `<strong>Kliknij, żeby otworzyć ❤️</strong>`;
                env1.onclick = () => alert("❤️ Kochana [Jej imię],\n\nJestem z Ciebie taki dumny! Udało Ci się zakończyć rok szkolny. Kocham Cię jeszcze mocniej.");
            }

            // Koperta 2
            const env2 = document.getElementById("envelope2");
            const status2 = document.getElementById("status2");
            if (now >= unlockDates.envelope2) {
                env2.classList.remove("locked");
                status2.innerHTML = `<strong>Kliknij, żeby otworzyć ❤️</strong>`;
                env2.onclick = () => alert("❤️ Moja najpiękniejsza,\n\nMinął już rok odkąd jesteśmy razem. Dziękuję Ci za każdy dzień z Tobą. Na zawsze Twój.");
            }
        }

        window.onload = checkEnvelopes;
        setInterval(checkEnvelopes, 60000);
    </script>
</body>
</html>
