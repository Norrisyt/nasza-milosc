<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasze odliczanie ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap');
        
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: #333;
            text-align: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { max-width: 700px; padding: 40px 20px; }
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.8rem;
            color: white;
            text-shadow: 0 0 20px rgba(255,105,180,0.8);
        }
        .subtitle { font-size: 1.4rem; color: #fff; margin-bottom: 40px; }
        .counter {
            background: white;
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        }
        .days { font-size: 6.5rem; font-weight: bold; color: #ff1493; }
        .days-label { font-size: 1.6rem; color: #666; margin-top: 10px; }
        .nav {
            margin: 35px 0 45px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .nav button {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav button:hover { background: #ff1493; transform: scale(1.08); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Od 1 października 2025 <span class="heart">❤️</span></h1>
        <p class="subtitle">Minęło razem z Tobą...</p>

        <div class="nav">
            <button onclick="location.href='index.html'">❤️ Strona główna</button>
            <button onclick="location.href='kalendarz.html'">Kalendarz Miłości</button>
            <button onclick="location.href='powody.html'">1000 Powodów</button>
            <button onclick="location.href='koperty.html'">Koperty specjalne</button>
            <button onclick="location.href='galeria.html'">Galeria wspomnień</button>
            <button onclick="location.href='os-czasu.html'">Nasza oś czasu</button>
        </div>

        <div class="counter">
            <div class="days" id="days">0</div>
            <div class="days-label">DNI</div>
        </div>
        
        <div class="date">
            Od: <strong>1 października 2025</strong><br>
            Dzisiaj: <strong id="today"></strong>
        </div>
    </div>

    <script>
        function calculateDays() {
            const startDate = new Date(2025, 9, 1);
            const today = new Date();
            const diffTime = Math.abs(today - startDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('days').textContent = diffDays;
            document.getElementById('today').textContent = today.toLocaleDateString('pl-PL', { day: 'numeric', month: 'long', year: 'numeric' });
        }
        window.onload = calculateDays;
        setInterval(calculateDays, 60000);
    </script>
</body>
</html>
