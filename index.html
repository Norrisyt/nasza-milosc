<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dla mojej najpiękniejszej ❤️</title>

    <!-- BLOKADA -->
    <script>
        if (!localStorage.getItem("adminMode")) {
            window.location.href = "maintenance.html";
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        
        body { margin:0; padding:0; font-family:'Poppins',sans-serif; background:linear-gradient(135deg,#ff9a9e 0%,#fad0c4 99%); color:#333; text-align:center; overflow-x:hidden; }
        .container { max-width:820px; margin:40px auto; padding:20px; }
        h1 { font-family:'Dancing Script',cursive; font-size:4.2rem; color:#fff; text-shadow:0 0 25px rgba(255,105,180,0.9); }
        .heart-big { font-size:6.5rem; cursor:pointer; transition:0.4s; }
        .heart-big:hover { transform:scale(1.2) rotate(10deg); }
        .reason { background:white; padding:20px; margin:15px auto; max-width:650px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1); text-align:left; display:none; }
        .reasons-list { margin-top:40px; }
        .nav button, button { background:#ff69b4; color:white; border:none; padding:14px 30px; font-size:1.2rem; border-radius:50px; cursor:pointer; margin:8px; }
        .nav button:hover, button:hover { background:#ff1493; transform:scale(1.08); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dla mojej najpiękniejszej <span class="heart-big" id="bigHeart">❤️</span></h1>
        <p style="font-size:1.4rem; color:#fff;">Kliknij w serce, żeby dostać jeden z 1000 powodów</p>

        <div class="nav">
            <button onclick="location.href='index.html'">❤️ Główna</button>
            <button onclick="location.href='powody.html'">Wszystkie powody</button>
            <button onclick="location.href='koperty.html'">Koperty specjalne</button>
            <button onclick="location.href='galeria.html'">Galeria</button>
            <button onclick="location.href='odliczanie.html'">Odliczanie</button>
        </div>

        <div id="currentReason" class="reason"></div>

        <div class="reasons-list" id="reasonsList"></div>

        <button onclick="toggleMusic()">♪ Muzyka: <span id="musicStatus">Włączona</span></button>
    </div>

    <!-- Belgijska / romantyczna muzyka (zmieniona) -->
    <audio id="bgMusic" autoplay loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3" type="audio/mpeg"> <!-- możesz zmienić link -->
    </audio>

    <script>
        const reasons = [
            "Twój uśmiech rozświetla mój cały dzień",
            "Kiedy się śmiejesz, zapominam o całym świecie",
            "Jesteś najcieplejszą osobą jaką znam",
            "Kocham sposób, w jaki na mnie patrzysz",
            "Przy Tobie czuję się jak w domu",
            // ... możesz dodać więcej powodów (nawet 1000)
        ];

        let savedReasons = JSON.parse(localStorage.getItem("savedReasons")) || [];

        function showRandomReason() {
            const random = reasons[Math.floor(Math.random() * reasons.length)];
            document.getElementById("currentReason").innerHTML = `<strong>Powód #{${savedReasons.length + 1}}:</strong><br>${random}`;
            document.getElementById("currentReason").style.display = "block";

            savedReasons.unshift(random);
            localStorage.setItem("savedReasons", JSON.stringify(savedReasons));
            renderSavedReasons();
        }

        function renderSavedReasons() {
            const list = document.getElementById("reasonsList");
            list.innerHTML = "<h2 style='color:#fff;'>Zapisane powody:</h2>";
            savedReasons.forEach((reason, i) => {
                const div = document.createElement("div");
                div.className = "reason";
                div.style.display = "block";
                div.innerHTML = `<strong>Powód #${savedReasons.length - i}:</strong><br>${reason}`;
                list.appendChild(div);
            });
        }

        document.getElementById("bigHeart").addEventListener("click", showRandomReason);

        // Muzyka
        const music = document.getElementById("bgMusic");
        function toggleMusic() {
            if (music.paused) {
                music.play();
                document.getElementById("musicStatus").textContent = "Włączona";
            } else {
                music.pause();
                document.getElementById("musicStatus").textContent = "Wyłączona";
            }
        }

        // Inicjalizacja
        window.onload = () => {
            renderSavedReasons();
            music.volume = 0.4;
        };
    </script>
</body>
</html>
