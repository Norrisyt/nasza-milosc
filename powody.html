<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1000 Powodów Dlaczego Cię Kocham ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');
        
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: #333;
            text-align: center;
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 40px auto; padding: 20px; }
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4.2rem;
            color: #fff;
            text-shadow: 0 0 25px rgba(255,105,180,0.9);
        }
        .subtitle { font-size: 1.5rem; color: #fff; margin-bottom: 40px; }
        .reason-card {
            background: white;
            padding: 25px 30px;
            margin: 20px auto;
            max-width: 700px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            text-align: left;
            font-size: 1.2rem;
            line-height: 1.7;
        }
        .nav {
            margin: 35px 0 45px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .nav button {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav button:hover { background: #ff1493; transform: scale(1.08); }
        .clear-btn {
            background: #ff1493;
            padding: 14px 40px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>1000 Powodów <span style="font-size:4.5rem;">❤️</span></h1>
        <p class="subtitle">Dlaczego kocham właśnie Ciebie...</p>

        <div class="nav">
            <button onclick="location.href='index.html'">❤️ Strona główna</button>
            <button onclick="location.href='kalendarz.html'">Kalendarz Miłości</button>
            <button onclick="location.href='koperty.html'">Koperty specjalne</button>
            <button onclick="location.href='galeria.html'">Galeria wspomnień</button>
            <button onclick="location.href='odliczanie.html'">Odliczanie dni</button>
            <button onclick="location.href='os-czasu.html'">Nasza oś czasu</button>
        </div>

        <div id="reasonsContainer"></div>

        <button class="clear-btn" onclick="clearAllReasons()">🗑️ Wyczyść wszystkie powody</button>
    </div>

    <script>
        let savedReasons = JSON.parse(localStorage.getItem("savedReasons")) || [];

        function renderReasons() {
            const container = document.getElementById("reasonsContainer");
            container.innerHTML = "";

            if (savedReasons.length === 0) {
                container.innerHTML = `<div class="reason-card" style="text-align:center;color:#888;">Kliknij serce na stronie głównej, żeby dodać pierwsze powody ❤️</div>`;
                return;
            }

            savedReasons.forEach((reason, index) => {
                const div = document.createElement("div");
                div.className = "reason-card";
                div.innerHTML = `<span style="color:#ff1493;font-weight:700;">Powód #${savedReasons.length - index}</span><br>${reason}`;
                container.appendChild(div);
            });
        }

        function clearAllReasons() {
            if (confirm("Na pewno chcesz usunąć wszystkie zapisane powody?")) {
                localStorage.removeItem("savedReasons");
                savedReasons = [];
                renderReasons();
            }
        }

        window.onload = renderReasons;
    </script>
</body>
</html>
